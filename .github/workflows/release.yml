name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (example: 1.0.1)"
        required: true
        default: "1.0.1"
      prerelease:
        description: "Mark as prerelease"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish plugin
        run: dotnet publish src/RetakePlugin/RetakePluginHost.csproj -c Release -o artifacts/publish/breakerandopendoor

      - name: Prepare release package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/release/breakerandopendoor

          # Copy published plugin artifacts.
          mkdir -p artifacts/release/breakerandopendoor/addons/counterstrikesharp/plugins/breakerandopendoor
          cp artifacts/publish/breakerandopendoor/breakerandopendoor.dll artifacts/release/breakerandopendoor/addons/counterstrikesharp/plugins/breakerandopendoor/

          if [ -f artifacts/publish/breakerandopendoor/breakerandopendoor.deps.json ]; then
            cp artifacts/publish/breakerandopendoor/breakerandopendoor.deps.json artifacts/release/breakerandopendoor/addons/counterstrikesharp/plugins/breakerandopendoor/
          fi

          if [ -f artifacts/publish/breakerandopendoor/breakerandopendoor.pdb ]; then
            cp artifacts/publish/breakerandopendoor/breakerandopendoor.pdb artifacts/release/breakerandopendoor/addons/counterstrikesharp/plugins/breakerandopendoor/
          fi

          # Copy default configuration file.
          mkdir -p artifacts/release/breakerandopendoor/addons/counterstrikesharp/configs/plugins/breakerandopendoor
          cp addons/counterstrikesharp/configs/plugins/breakerandopendoor/breakerandopendoor.json artifacts/release/breakerandopendoor/addons/counterstrikesharp/configs/plugins/breakerandopendoor/

          # Create release zip.
          cd artifacts/release
          zip -r breakerandopendoor.zip breakerandopendoor/

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: Release ${{ steps.tag.outputs.value }}
          body: |
            ## BreakerAndOpenDoor ${{ steps.tag.outputs.value }}

            ### Installation
            1. Download `breakerandopendoor.zip`
            2. Extract the archive
            3. Copy the `addons` folder into your server `game/csgo/`
            4. Restart the server or change map

            ### Configuration
            Edit:
            ```
            addons/counterstrikesharp/configs/plugins/breakerandopendoor/breakerandopendoor.json
            ```

            ### Features
            - Automatic door opening with per-round random chance
            - Window breaking
            - Vent breaking
            - Other breakable entities support

            ### Requirements
            - CS2 Dedicated Server
            - Metamod:Source
            - CounterStrikeSharp
          files: artifacts/release/breakerandopendoor.zip
          prerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease || false }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
